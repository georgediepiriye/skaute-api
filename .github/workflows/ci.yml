name: Skaute-CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: --name mongodb
        command: --replSet rs0 --bind_ip_all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Start Mongo
        run: |
          docker exec mongodb mongosh --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"
          sleep 10
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 5000
          DEV_DATABASE_URL: mongodb://localhost:27017/Skaute-Test?replicaSet=rs0

          # Security
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_EXPIRATION_DAYS: 1

          # Payments
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          PAYSTACK_BASE_API: https://api.paystack.co
          PAYSTACK_FEE_PERCENTAGE: "0.015"
          PAYSTACK_FEE_FIXED: "100"

          # Infrastructure
          REDIS_PUBLIC_URL: redis://localhost:6379
          CLIENT_ORIGIN: http://localhost:3000
          API_URL: http://localhost:5000
          SKAUTE_FEE_PERCENTAGE: "0.05"

          # Third-party (Zod requires these strings)
          SENDGRID_API_KEY: SG.test_key
          SENTRY_DSN: https://public@sentry.io/12345
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
